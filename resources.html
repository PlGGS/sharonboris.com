<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css" rel="stylesheet">
</head>
<div>
    <div id="script-blocker"></div>
</div>
<section id="home">
    <div class="scaleable-wrapper" id="scaleable-wrapper">
        <h1>Resources</h1>
    </div>
</section>
<section id="forms">
    <script>
        /*
         * Creates url bubbles for each file located at https://api.github.com/repos/plggs/sharonboris.com/contents/files/ + dir
         * @param string dir The directory name to pull file names from
         */
        function getFileBubbles(dir) {
            $.ajax({
                type: 'GET',
                crossDomain: true,
                dataType: 'json',
                url: 'https://api.github.com/repos/plggs/sharonboris.com/contents/files/' + dir,
                success: function (data) {
                    let containerForms = [];

                    //add files in reverse order as of mom's request
                    for (let file of data) {
                        containerForms.unshift(`<div><a href="${file.path}" target="_blank" rel="noopener noreferrer"><div class="label"><h1>${file.name}</h1></div></a></div>`);
                    }
                    containerForms.unshift('<div class="container">');
                    containerForms.push('</div>');

                    $("#" + dir).html(containerForms.join(''));
                }
            })
        }
    </script>
    <div class="inner">
        <h2>Forms</h2>
        <h3>New Clients</h3>
        <script>
            getFileBubbles('new-patient');
        </script>
        <span id="new-patient">
        </span>
        <h3>Telehealth</h3>
        <script>
            getFileBubbles('telehealth');
        </script>
        <span id="telehealth">
        </span>
    </div>
</section>
